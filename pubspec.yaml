name: bubududu_admin_panel
description: Bubu Dudu Admin Panel - Order Management System for Custom Animation Videos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.1.0
  cloud_firestore: ^5.1.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.3
  firebase_storage: ^12.1.0
  flutter_local_notifications: ^17.2.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  http: ^1.2.1
  csv: ^6.0.0
  share_plus: ^10.0.0
  flutter_slidable: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
